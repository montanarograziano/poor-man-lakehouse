site_name: Poor Man's Lakehouse
site_description: A composable, local Open Source Lakehouse with multiple catalog backends, compute engines, and table formats.
site_url: https://montanarograziano.github.io/poor-man-lakehouse/
repo_url: https://github.com/montanarograziano/poor-man-lakehouse
repo_name: montanarograziano/poor-man-lakehouse

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - toc.follow

nav:
  - Home: index.md
  - Getting Started:
      - Installation: guides/installation.md
      - Configuration: guides/configuration.md
      - Quick Start: guides/quickstart.md
  - Connectors:
      - Overview: guides/connectors-overview.md
      - Ibis Multi-Engine: guides/ibis-connector.md
      - PyIceberg Client: guides/pyiceberg-connector.md
      - Polars Client: guides/polars-connector.md
      - Spark Builders: guides/spark-connector.md
      - Dremio Connection: guides/dremio-connector.md
      - Catalog Browser: guides/catalog-browser.md
  - Infrastructure:
      - Docker Services: guides/docker-services.md
      - Spark Cluster: guides/spark-cluster.md
  - API Reference: reference/

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
  - minify:
      minify_html: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true
